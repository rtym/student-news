spring.application.name=student-news

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/student_news}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:student}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:student}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

server.port=8080
