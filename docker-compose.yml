services:
  db:
    image: postgres:16-alpine
    container_name: student-news-db
    environment:
      POSTGRES_DB: student_news
      POSTGRES_USER: student
      POSTGRES_PASSWORD: student
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U student -d student_news"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: student-news-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/student_news
      SPRING_DATASOURCE_USERNAME: student
      SPRING_DATASOURCE_PASSWORD: student
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
    container_name: student-news-frontend
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  postgres_data:
